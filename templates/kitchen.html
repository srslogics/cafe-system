<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kitchen Dashboard</title>

<style>

body{
margin:0;
font-family:"Segoe UI", Arial, sans-serif;
background:#f3f1ed;
}

.header{
background:#222;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:500;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:18px;
padding:20px;
}

.order-card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.table{
font-size:22px;
font-weight:bold;
margin-bottom:8px;
color:#333;
}

.customer{
color:#777;
font-size:14px;
margin-bottom:12px;
}

.items{
margin-top:10px;
}

.item{
font-size:16px;
margin-bottom:6px;
}

.status{
margin-top:12px;
font-weight:bold;
font-size:15px;
}

.new{
color:#ff6b35;
}

.preparing{
color:#f0ad4e;
}

.ready{
color:#28a745;
}

.actions{
margin-top:12px;
display:flex;
gap:8px;
}

button{
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.prep-btn{
background:#f0ad4e;
color:white;
}

.ready-btn{
background:#28a745;
color:white;
}

.empty{
text-align:center;
font-size:18px;
color:#777;
margin-top:50px;
}

</style>

</head>

<body>

<div class="header">
Kitchen Orders
</div>

<div class="container">

{% if tables %}

{% for table_id, table in tables.items() %}

<div class="order-card">

<div class="table">
Table {{table_id}}
</div>

<div class="customer">
Customer: {{table.customer}}
</div>

<div class="items">

{% for item in table.items %}

<div class="item">
• {{item}}
</div>

{% endfor %}

</div>

<div class="status 
{% if table.status == 'NEW' %}new
{% elif table.status == 'PREPARING' %}preparing
{% elif table.status == 'READY' %}ready
{% endif %}
">

Status: {{table.status}}

</div>

<div class="actions">

<form action="/update-status/{{table_id}}" method="post">

<input type="hidden" name="status" value="PREPARING">

<button class="prep-btn">
Preparing
</button>

</form>

<form action="/update-status/{{table_id}}" method="post">

<input type="hidden" name="status" value="READY">

<button class="ready-btn">
Ready
</button>

</form>

</div>

</div>

{% endfor %}

{% else %}

<div class="empty">
No orders yet
</div>

{% endif %}

</div>

<script>

setInterval(() => {
location.reload()
},4000)

</script>

</body>

</html>
