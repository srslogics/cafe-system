<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kitchen Dashboard</title>

<style>

body{
margin:0;
font-family:"Segoe UI", Arial, sans-serif;
background:#f3f1ed;
}

.header{
background:#222;
color:white;
padding:18px;
text-align:center;
font-size:22px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:15px;
padding:20px;
}

.order-card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.table{
font-size:20px;
font-weight:bold;
margin-bottom:8px;
}

.customer{
color:#777;
font-size:14px;
margin-bottom:10px;
}

.item{
font-size:16px;
margin-bottom:8px;
}

.status{
margin-top:10px;
font-weight:bold;
}

.new{
color:#ff6b35;
}

.preparing{
color:#f0ad4e;
}

.ready{
color:#28a745;
}

</style>

</head>

<body>

<div class="header">
Kitchen Orders
</div>

<div class="container">

{% for order in orders %}

<div class="order-card">

<div class="table">
Table {{order.table_id}}
</div>

<div class="customer">
Customer: {{order.customer_name}}
</div>

<div class="item">
{{order.item}}
</div>

<div class="status new">
Status: {{order.status}}
</div>

</div>

{% endfor %}

</div>

<script>

setInterval(() => {
location.reload()
},4000)

</script>

</body>

</html>
