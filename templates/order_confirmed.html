<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed</title>
<link rel="stylesheet" href="/static/base.css">
<link rel="stylesheet" href="/static/confirm.css">

</head>

<body>

<div class="container">

<div class="progress">

<div class="step active">
<span>1</span>
<p>Order Placed</p>
</div>

<div class="line"></div>

<div class="step">
<span>2</span>
<p>Preparing</p>
</div>

<div class="line"></div>

<div class="step">
<span>3</span>
<p>Served</p>
</div>

</div>

<div class="icon">
☕
</div>

<h1>Order Confirmed</h1>

<p class="message">
Your order has been sent to the kitchen.
</p>

<p class="sub">
Please relax while we prepare your coffee.
</p>

<a href="/menu/{{table}}?name={{name}}&phone={{phone}}">
<button>
Order More
</button>
</a>

<p class="message">
Estimated preparation time: 8–10 minutes
</p>

</div>

</body>

</html>
