<!DOCTYPE html>
<html>

<head>

<title>Rate Your Experience</title>

<style>

body{
font-family:Arial;
background:#f3f1ed;
}

.container{
max-width:450px;
margin:auto;
background:white;
padding:25px;
margin-top:40px;
border-radius:10px;
text-align:center;
}

.stars{
font-size:28px;
margin:15px 0;
}

textarea{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
margin-top:10px;
}

button{
width:100%;
padding:14px;
background:#6f4e37;
color:white;
border:none;
border-radius:8px;
margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<h2>Rate Your Experience</h2>

<form action="/submit-feedback" method="post">

<div class="stars">

<label><input type="radio" name="rating" value="1">⭐</label>
<label><input type="radio" name="rating" value="2">⭐⭐</label>
<label><input type="radio" name="rating" value="3">⭐⭐⭐</label>
<label><input type="radio" name="rating" value="4">⭐⭐⭐⭐</label>
<label><input type="radio" name="rating" value="5">⭐⭐⭐⭐⭐</label>

</div>

<textarea name="comment" placeholder="Leave a comment"></textarea>

<button>
Submit Feedback
</button>

</form>

</div>

</body>

</html>
