<!DOCTYPE html>
<html>

<head>

<title>Your Bill</title>

<link rel="stylesheet" href="/static/bill.css">

</head>

<body>

<div class="container">

<div class="header">
<h2>Your Bill</h2>
<p class="table">Table {{table}}</p>
</div>

<div class="items">

{% for item in items %}

<div class="item">
<span class="item-name">{{item.name}}</span>
<span class="item-price">₹{{item.price}}</span>
</div>

{% endfor %}

</div>

<div class="divider"></div>

<div class="total">
<span>Total</span>
<span>₹{{total}}</span>
</div>

<form action="/pay" method="post">

<button>
Pay Now
</button>

</form>

</div>

</body>

</html>
