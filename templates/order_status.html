<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Status</title>
<link rel="stylesheet" href="/static/base.css">
<link rel="stylesheet" href="/static/status.css">

</head>

<body>

<div class="container">

<h2>Your Order</h2>

<p class="table">
Table {{table}}
</p>

<div class="status">

<div class="step active">
<span>1</span>
<p>Order Placed</p>
</div>

<div class="line"></div>

<div class="step active">
<span>2</span>
<p>Preparing</p>
</div>

<div class="line"></div>

<div class="step">
<span>3</span>
<p>Ready</p>
</div>

</div>

<p class="message">
Your order is being prepared. Please relax while we get it ready.
</p>

</div>

</body>

</html>
