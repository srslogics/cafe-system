<!DOCTYPE html>
<html>

<head>

</head>

<body>

<div class="container">

<h2>Your Order</h2>

<p class="table">

</p>

<div class="status">

<div class="step active">

</div>

<div class="line"></div>

<div class="step">
<span>3</span>

</div>

</div>

Your order is being prepared. Please relax while we get it ready.
</p>

</div>

</body>

</html>
