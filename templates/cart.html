<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Order | Three Beans</title>

<link rel="stylesheet" href="/static/cart.css">

</head>

<body>

<div class="header">
Your Order
</div>

<div class="subheader">
Table {{table}} • {{name}}
</div>

<div class="container">

{% if cart %}

{% for item in cart %}

<div class="card">

<div class="left">

<div class="item-name">
{{item.item}}
</div>

<div class="qty">
Qty: {{item.qty}}
</div>

</div>

<div class="price">
₹{{item.price}}
</div>

</div>

{% endfor %}

<div class="total">

<span>Total</span>

<span>₹{{total}}</span>

</div>

{% else %}

<div class="empty">

Your cart is empty ☕

</div>

{% endif %}

</div>

<div class="buttons">

<form action="/place-order" method="post">

<button class="order-btn">
Place Order
</button>

</form>

<a href="/menu/{{table}}?name={{name}}&phone={{phone}}">

<button class="back-btn">
Add More Items
</button>

</a>

</div>

</body>
</html>
