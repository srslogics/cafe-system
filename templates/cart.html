<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Order | Three Beans</title>

<style>

body{
margin:0;
font-family:"Segoe UI", Arial, sans-serif;
background:#f3f1ed;
}

.header{
background:#6f4e37;
color:white;
padding:16px;
text-align:center;
font-size:20px;
}

.subheader{
text-align:center;
color:#555;
margin-top:6px;
font-size:14px;
}

.container{
max-width:500px;
margin:auto;
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.total{
background:white;
padding:15px;
border-radius:10px;
margin-top:10px;
font-weight:bold;
display:flex;
justify-content:space-between;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
margin-top:15px;
}

.order-btn{
background:#6f4e37;
color:white;
}

.order-btn:hover{
background:#5c3f2c;
}

.back-btn{
background:#ccc;
margin-top:10px;
}

.empty{
text-align:center;
color:#777;
margin-top:30px;
}

</style>

</head>

<body>

<div class="header">
Your Order
</div>

<div class="subheader">
Table {{table}} • {{name}}
</div>

<div class="container">

{% if cart %}

{% for item in cart %}

<div class="card">

<span>{{item.item}}</span>

<span>₹{{item.price if item.price else "—"}}</span>

</div>

{% endfor %}

<div class="total">

<span>Total</span>

<span>₹{{total}}</span>

</div>

<form action="/place-order" method="post">

<button class="order-btn">
Place Order
</button>

</form>

{% else %}

<div class="empty">

Your cart is empty

</div>

{% endif %}

<a href="/menu/{{table}}?name={{name}}&phone={{phone}}">

<button class="back-btn">

Add More Items

</button>

</a>

</div>

</body>
</html>
