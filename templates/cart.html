<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Order | Three Beans</title>

<style>

body{
margin:0;
font-family:"Segoe UI", Arial, sans-serif;
background:#f3f1ed;
}

.header{
background:#6f4e37;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:500;
}

.subheader{
text-align:center;
color:#555;
margin:8px 0 15px 0;
font-size:14px;
}

.container{
max-width:520px;
margin:auto;
padding:15px;
padding-bottom:90px;
}

.card{
background:white;
padding:16px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.item-name{
font-size:16px;
color:#333;
}

.price{
color:#666;
font-size:14px;
}

.total{
background:white;
padding:16px;
border-radius:10px;
margin-top:10px;
font-weight:600;
display:flex;
justify-content:space-between;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.buttons{
position:fixed;
bottom:0;
left:0;
right:0;
background:#ffffff;
padding:15px;
box-shadow:0 -3px 10px rgba(0,0,0,0.05);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

.order-btn{
background:#6f4e37;
color:white;
}

.order-btn:hover{
background:#5c3f2c;
}

.back-btn{
background:#ccc;
}

.empty{
text-align:center;
color:#777;
margin-top:40px;
font-size:16px;
}

</style>

</head>

<body>

<div class="header">
Your Order
</div>

<div class="subheader">
Table {{table}} • {{name}}
</div>

<div class="container">

{% if cart %}

{% for item in cart %}

<div class="card">

<div class="item-name">
{{item.item}}
</div>

<div class="price">
₹{{item.price}}
</div>

</div>

{% endfor %}

<div class="total">

<span>Total</span>

<span>₹{{total}}</span>

</div>

{% else %}

<div class="empty">

Your cart is empty ☕

</div>

{% endif %}

</div>

<div class="buttons">

<form action="/place-order" method="post">

<button class="order-btn">
Place Order
</button>

</form>

<a href="/menu/{{table}}?name={{name}}&phone={{phone}}">

<button class="back-btn">
Add More Items
</button>

</a>

</div>

</body>
</html>
