<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Three Beans | Order</title>
<link rel="stylesheet" href="/static/base.css">
<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

<div class="logo">
Three Beans
</div>

<div class="subtitle">
Coffee • Conversations • Comfort
</div>

<div class="table">
Table {{table_id}}
</div>

<form action="/start-order" method="post">

<input type="hidden" name="table_id" value="{{table_id}}">

<label>Your Name</label>
<input 
type="text" 
name="customer_name" 
placeholder="Enter your name"
required
>

<label>Phone Number</label>
<input 
type="text" 
name="customer_phone"
placeholder="Enter your phone number"
required
>

<button type="submit">
Start Ordering
</button>

</form>

<div class="footer">
Powered by Smart Cafe System
</div>

</div>

</body>

</html>
