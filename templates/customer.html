<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Three Beans | Order</title>

<style>

body{
margin:0;
font-family: "Segoe UI", Arial, sans-serif;
background:#f3f1ed;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.container{
background:white;
width:100%;
max-width:420px;
padding:35px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.logo{
text-align:center;
font-size:28px;
font-weight:600;
color:#3b2d25;
margin-bottom:5px;
}

.subtitle{
text-align:center;
color:#777;
font-size:14px;
margin-bottom:25px;
}

.table{
text-align:center;
font-size:18px;
color:#555;
margin-bottom:20px;
}

label{
font-size:14px;
color:#444;
}

input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:18px;
border-radius:6px;
border:1px solid #ddd;
font-size:15px;
}

button{
width:100%;
background:#6f4e37;
color:white;
padding:14px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#5c3f2c;
}

.footer{
text-align:center;
font-size:12px;
color:#999;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
Three Beans
</div>

<div class="subtitle">
Coffee • Conversations • Comfort
</div>

<div class="table">
Table {{table_id}}
</div>

<form action="/start-order" method="post">

<input type="hidden" name="table_id" value="{{table_id}}">

<label>Your Name</label>
<input 
type="text" 
name="customer_name" 
placeholder="Enter your name"
required
>

<label>Phone Number</label>
<input 
type="text" 
name="customer_phone"
placeholder="Enter your phone number"
required
>

<button type="submit">
Start Ordering
</button>

</form>

<div class="footer">
Powered by Smart Cafe System
</div>

</div>

</body>
</html>
